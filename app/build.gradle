plugins {
    id 'com.android.application'
}

android {
    namespace "com.example.app"
    compileSdk 36

    defaultConfig {
        applicationId "com.example.app"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation "dev.rikka.shizuku:api:13.2.0"
    implementation "androidx.annotation:annotation:1.7.0"  // elimina os warnings
}
