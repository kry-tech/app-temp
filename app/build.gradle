plugins {
    id 'com.android.application'
}

android {
    namespace "com.example.app"
    compileSdk 36

    defaultConfig {
        applicationId "com.example.app"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    // Voltando para a versão estável que realmente existe nos repositórios
    implementation "dev.rikka.shizuku:api:13.1.5"
}
